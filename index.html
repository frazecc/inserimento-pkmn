<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Inserimento Pokémon & Controllo Guidato</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            color: #333;
            padding: 40px; 
            max-width: 700px;
            margin: 0 auto;
        }
        h1 { color: #0056b3; text-align: center; margin-bottom: 30px; }
        
        .box-standard, .wizard-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        label { font-weight: bold; color: #555; font-size: 0.95em; text-transform: uppercase; }
        
        input[type="text"] { 
            padding: 10px; 
            border: 2px solid #ddd; 
            border-radius: 6px;
            font-size: 1.05em;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        input[type="text"]:focus { border-color: #007bff; }
        
        /* Stile speciale per il gruppo del Link */
        .link-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn-open-link {
            background: #17a2b8;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            white-space: nowrap;
            font-size: 0.95em;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            box-sizing: border-box;
        }
        .btn-open-link:hover { background: #138496; }
        .scorciatoia-info {
            font-size: 0.8em;
            color: #6c757d;
            margin-top: 4px;
            font-style: italic;
        }
        
        .btn-green {
            width: 100%;
            background: #28a745; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1.1em;
            transition: background 0.2s;
        }
        .btn-green:hover { background: #218838; }

        .btn-primary {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.05em;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #0056b3; }
        
        ol { padding-left: 20px; margin: 0; }
        li { padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 1.05em; }
        
        .contatore {
            float: right;
            background: #007bff;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8em;
        }

        .stato-notifica {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: bold;
            text-align: center;
        }

        /* Stili del Wizard */
        .wizard-container { display: none; }
        .wizard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .wizard-title { font-size: 1.3em; margin: 0; color: #333; }
        .wizard-progresso { font-weight: bold; color: #007bff; background: #e6f2ff; padding: 4px 10px; border-radius: 15px; font-size: 0.9em; }
        
        .badge-stato {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .stato-ok { background-color: #d4edda; color: #155724; }
        .stato-fallback { background-color: #fff3cd; color: #856404; }

        .grid-campi {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .grid-campi { grid-template-columns: 1fr; }
        }

        .wizard-footer {
            display: flex;
            justify-content: flex-end;
            border-top: 2px solid #f0f0f0;
            padding-top: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>🃏 Inserimento Rapido & Verifica Guidata</h1>
    
    <div id="notifica" class="stato-notifica"></div>

    <div id="sezione-inserimento">
        <div class="box-standard">
            <div class="input-group">
                <label for="input-testo">Digita il testo della carta e premi Invio:</label>
                <input type="text" id="input-testo" placeholder="Inserisci il testo qui..." autofocus>
            </div>
            <button class="btn-green" onclick="avviaVerificaDati()">Fase di inserimento terminata e verifica DB</button>
        </div>

        <div class="box-standard">
            <h3>Carte Inserite in questa sessione <span id="badge-conteggio" class="contatore">0</span></h3>
            <ol id="elenco-temporaneo"></ol>
        </div>
    </div>

    <div id="sezione-wizard" class="wizard-container">
        <div class="wizard-card">
            <div class="wizard-header">
                <h2 class="wizard-title" id="wizard-entry-corrente">Controllo Elemento</h2>
                <span class="wizard-progresso" id="wizard-indice-progresso">Elemento 1 di 1</span>
            </div>
            
            <div id="wizard-badge-stato" class="badge-stato">Stato</div>

            <div class="grid-campi">
                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" id="w-nome">
                </div>
                <div class="input-group">
                    <label>Codice</label>
                    <input type="text" id="w-codice">
                </div>
                <div class="input-group">
                    <label>Lingua</label>
                    <input type="text" id="w-lingua">
                </div>
                <div class="input-group">
                    <label>Condizione</label>
                    <input type="text" id="w-condiz">
                </div>
                <div class="input-group" style="grid-column: span 2;">
                    <label>Link / Risorsa Esterna</label>
                    <div class="link-input-wrapper">
                        <input type="text" id="w-link" placeholder="http://...">
                        <a href="#" id="btn-link-cliccabile" target="_blank" class="btn-open-link">Apri Link 🔗</a>
                    </div>
                    <span class="scorciatoia-info">Puoi anche usare la combinazione rapida <strong>CTRL + Q</strong> in qualsiasi momento per aprire questo collegamento</span>
                </div>
                <div class="input-group">
                    <label>Prezzo</label>
                    <input type="text" id="w-prezzo">
                </div>
                <div class="input-group">
                    <label>Note</label>
                    <input type="text" id="w-note">
                </div>
                <div class="input-group" style="grid-column: span 2;">
                    <label>Proprietario</label>
                    <input type="text" id="w-proprietario">
                </div>
            </div>

            <div class="wizard-footer">
                <button class="btn-primary" id="btn-wizard-avanti" onclick="wizardAvanti()">Avanti ➡️</button>
            </div>
        </div>
    </div>

    <script>
        let elencoCarte = [];
        let risultatiElaborati = [];
        let indiceCorrente = 0;
        let datiFinalizzatiPerDB = [];
        
        const URL_API_GOOGLE = "https://script.google.com/macros/s/AKfycbyk9JIavd03rNPWNXsZbb88Lik2W6BhkTHrE0cs4JxHdgV5sfqRByu3fM61XQFk4_21ww/exec";

        // INTERCETTAZIONE UNIVERSALE TASTI RAPIDI (CTRL + Q)
        window.addEventListener('keydown', function(e) {
            // Controlliamo se la sezione del Wizard è attiva e visibile
            const wizardVisibile = document.getElementById('sezione-wizard').style.display === "block";
            
            if (wizardVisibile && (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'q') {
                e.preventDefault();  // Blocca categoricamente l'azione predefinita del browser
                e.stopPropagation(); // Impedisce la propagazione del comando a livello di sistema
                
                apriLinkCorrente();
            }
        }, true); // Il parametro "true" forza la cattura dell'evento prima di chiunque altro

        function apriLinkCorrente() {
            const url = document.getElementById('w-link').value.trim();
            if (url && url !== "#" && url !== "") {
                window.open(url, '_blank');
            } else {
                alert("Nessun link valido inserito in questo campo.");
            }
        }

        // Avviso anti-chiusura accidentale della pagina
        window.addEventListener('beforeunload', function (e) {
            if (risultatiElaborati.length > 0 && indiceCorrente < risultatiElaborati.length) {
                e.preventDefault();
                e.returnValue = 'Hai una procedura di verifica in corso. Se esci perderai i dati modificati!';
            }
        });

        // Al caricamento, controlla se c'era un lavoro lasciato a metà nel browser
        window.addEventListener('load', function() {
            if(localStorage.getItem('wizard_backup_risultati')) {
                if(confirm("È stato trovato un lavoro di verifica non completato. Vuoi riprendere da dove avevi lasciato?")) {
                    risultatiElaborati = JSON.parse(localStorage.getItem('wizard_backup_risultati'));
                    indiceCorrente = parseInt(localStorage.getItem('wizard_backup_indice')) || 0;
                    datiFinalizzatiPerDB = JSON.parse(localStorage.getItem('wizard_backup_dati_salvati')) || [];
                    
                    document.getElementById('sezione-inserimento').style.display = "none";
                    document.getElementById('sezione-wizard').style.display = "block";
                    mostraElementoWizard(indiceCorrente);
                } else {
                    pulisciBackupLocale();
                }
            }
        });

        document.getElementById('input-testo').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { aggiungiCarta(); }
        });

        function aggiungiCarta() {
            const input = document.getElementById('input-testo');
            const testo = input.value.trim();
            if (testo === "") return;

            elencoCarte.push(testo);

            const lista = document.getElementById('elenco-temporaneo');
            const nuovoElemento = document.createElement('li');
            nuovoElemento.textContent = testo;
            lista.appendChild(nuovoElemento);

            document.getElementById('badge-conteggio').innerText = elencoCarte.length;
            input.value = "";
            input.focus();
        }

        async function avviaVerificaDati() {
            if (elencoCarte.length === 0) {
                alert("Non hai inserito alcun elemento da verificare.");
                return;
            }
            
            const notifica = document.getElementById('notifica');
            notifica.style.display = "block";
            notifica.style.background = "#fff3cd";
            notifica.style.color = "#856404";
            notifica.innerText = `Interrogazione Database in corso per ${elencoCarte.length} elementi...`;

            try {
                const response = await fetch(URL_API_GOOGLE, {
                    method: 'POST',
                    body: JSON.stringify({ azione: "verifica_iniziale", carte: elencoCarte })
                });

                const testoRisposta = await response.text();
                const rispostaDati = JSON.parse(testoRisposta);

                if(rispostaDati.success) {
                    notifica.style.display = "none";
                    risultatiElaborati = rispostaDati.risultati;
                    indiceCorrente = 0;
                    datiFinalizzatiPerDB = [];
                    
                    salvaBackupLocale();

                    document.getElementById('sezione-inserimento').style.display = "none";
                    document.getElementById('sezione-wizard').style.display = "block";
                    
                    mostraElementoWizard(indiceCorrente);
                    
                    elencoCarte = [];
                    document.getElementById('elenco-temporaneo').innerHTML = "";
                    document.getElementById('badge-conteggio').innerText = "0";
                } else {
                    throw new Error(rispostaDati.error);
                }
                
            } catch (error) {
                console.error("Errore:", error);
                notifica.style.background = "#f8d7da";
                notifica.style.color = "#721c24";
                notifica.innerText = "❌ Errore durante l'elaborazione dei dati a DB: " + error.message;
            }
        }

        function mostraElementoWizard(indice) {
            if (indice >= risultatiElaborati.length) return;
            
            const item = risultatiElaborati[indice];
            
            document.getElementById('wizard-entry-corrente').innerText = `Verifica per: "${item.entry}"`;
            document.getElementById('wizard-indice-progresso').innerText = `Elemento ${indice + 1} di ${risultatiElaborati.length}`;
            
            const badge = document.getElementById('wizard-badge-stato');
            badge.innerText = item.stato;
            if(item.stato === "Trovato nel DB") {
                badge.className = "badge-stato stato-ok";
            } else {
                badge.className = "badge-stato stato-fallback";
            }
            
            document.getElementById('w-nome').value = item.dati.nome || "";
            document.getElementById('w-codice').value = item.dati.codice || "";
            document.getElementById('w-lingua').value = item.dati.lingua || "";
            document.getElementById('w-condiz').value = item.dati.condiz || "";
            
            // Gestione Link testo e ancora dinamica
            const urlCorrente = item.dati.link || "";
            const inputLink = document.getElementById('w-link');
            const btnLink = document.getElementById('btn-link-cliccabile');
            
            inputLink.value = urlCorrente;
            btnLink.href = urlCorrente && urlCorrente.startsWith('http') ? urlCorrente : "#";
            
            // Aggiorna dinamicamente il pulsante se l'utente modifica l'input a mano
            inputLink.oninput = function() {
                btnLink.href = this.value.trim().startsWith('http') ? this.value.trim() : "#";
            };

            document.getElementById('w-prezzo').value = item.dati.prezzo || "";
            document.getElementById('w-note').value = item.dati.note || "";
            document.getElementById('w-proprietario').value = item.dati.proprietario || "";

            const btn = document.getElementById('btn-wizard-avanti');
            if (indice === risultatiElaborati.length - 1) {
                btn.innerText = "Finalizza e Salva su Foglio Google 💾";
                btn.style.background = "#28a745";
            } else {
                btn.innerText = "Avanti ➡️";
                btn.style.background = "#007bff";
            }
        }

        function wizardAvanti() {
            const rigaCompilata = {
                nome: document.getElementById('w-nome').value.trim(),
                codice: document.getElementById('w-codice').value.trim(),
                lingua: document.getElementById('w-lingua').value.trim(),
                condiz: document.getElementById('w-condiz').value.trim(),
                link: document.getElementById('w-link').value.trim(),
                prezzo: document.getElementById('w-prezzo').value.trim(),
                note: document.getElementById('w-note').value.trim(),
                proprietario: document.getElementById('w-proprietario').value.trim()
            };
            
            datiFinalizzatiPerDB.push(rigaCompilata);
            
            indiceCorrente++;
            salvaBackupLocale();
            
            if (indiceCorrente < risultatiElaborati.length) {
                mostraElementoWizard(indiceCorrente);
            } else {
                inviaDatiFinaliAGoogle();
            }
        }

        async function inviaDatiFinaliAGoogle() {
            document.getElementById('sezione-wizard').style.display = "none";
            
            const notifica = document.getElementById('notifica');
            notifica.style.display = "block";
            notifica.style.background = "#fff3cd";
            notifica.style.color = "#856404";
            notifica.innerText = "Scrittura finale dei dati validati sul Foglio Google in corso...";

            try {
                const response = await fetch(URL_API_GOOGLE, {
                    method: 'POST',
                    body: JSON.stringify({ azione: "salvataggio_finale", datiFinali: datiFinalizzatiPerDB })
                });

                const testoRisposta = await response.text();
                const rispostaDati = JSON.parse(testoRisposta);

                if (rispostaDati.success) {
                    notifica.style.background = "#d4edda";
                    notifica.style.color = "#155724";
                    notifica.innerHTML = "🎉 <strong>my job here is done!</strong><br>Tutti i dati controllati sono stati salvati correttamente.";
                    
                    pulisciBackupLocale();
                    risultatiElaborati = [];
                    datiFinalizzatiPerDB = [];
                    indiceCorrente = 0;
                    
                    setTimeout(() => {
                        notifica.style.display = "none";
                        document.getElementById('sezione-inserimento').style.display = "block";
                    }, 5000);

                } else {
                    throw new Error(rispostaDati.error);
                }
            } catch (error) {
                console.error("Errore nel salvataggio finale:", error);
                notifica.style.background = "#f8d7da";
                notifica.style.color = "#721c24";
                notifica.innerText = "❌ Errore durante il salvataggio finale a DB: " + error.message + ". Ricarica la pagina per riprovare, i tuoi progressi sono al sicuro.";
                indiceCorrente--;
                salvaBackupLocale();
            }
        }

        function salvaBackupLocale() {
            localStorage.setItem('wizard_backup_risultati', JSON.stringify(risultatiElaborati));
            localStorage.setItem('wizard_backup_indice', indiceCorrente);
            localStorage.setItem('wizard_backup_dati_salvati', JSON.stringify(datiFinalizzatiPerDB));
        }

        function pulisciBackupLocale() {
            localStorage.removeItem('wizard_backup_risultati');
            localStorage.removeItem('wizard_backup_indice');
            localStorage.removeItem('wizard_backup_dati_salvati');
        }
    </script>
</body>
</html>

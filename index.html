<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Inserimento Pokémon</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            color: #333;
            padding: 40px; 
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { color: #0056b3; text-align: center; margin-bottom: 30px; }
        
        .box-inserimento {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        label { font-weight: bold; color: #555; }
        
        input[type="text"] { 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px;
            font-size: 1.1em;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #007bff;
        }
        
        .btn-fine {
            width: 100%;
            background: #28a745; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1.1em;
            transition: background 0.2s;
        }
        .btn-fine:hover { background: #218838; }

        .sezione-elenco {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .sezione-elenco h3 { margin-top: 0; color: #444; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        ol { padding-left: 20px; margin: 0; }
        
        li { 
            padding: 8px 0; 
            border-bottom: 1px solid #f0f0f0; 
            font-size: 1.05em; 
            word-break: break-word;
        }
        li:last-child { border-bottom: none; }
        
        .contatore {
            float: right;
            background: #007bff;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>

    <h1>🃏 Inserimento Rapido Collezione</h1>
    
    <div class="box-inserimento">
        <div class="input-group">
            <label for="input-testo">Digita il testo della carta e premi Invio:</label>
            <input type="text" id="input-testo" placeholder="Es: Abomasnow ASR TG01 ITA NM..." autofocus>
        </div>
        <button class="btn-fine" onclick="finalizzaInserimento()">Fase di inserimento terminata</button>
    </div>

    <div class="sezione-elenco">
        <h3>Carte Inserite in questa sessione <span id="badge-conteggio" class="contatore">0</span></h3>
        <ol id="elenco-temporaneo">
            </ol>
    </div>

    <script>
        // Array in memoria JavaScript per salvare temporaneamente le stringhe digitate
        let elencoCarte = [];

        // Intercettiamo la pressione del tasto Invio nella cella di testo
        document.getElementById('input-testo').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                aggiungiCarta();
            }
        });

        function aggiungiCarta() {
            const input = document.getElementById('input-testo');
            const testo = input.value.trim();

            // Evitiamo di inserire righe vuote
            if (testo === "") return;

            // Salviamo il testo nell'elenco in memoria
            elencoCarte.push(testo);

            // Aggiorniamo la lista visiva a schermo (mostrando l'ultima inserita in fondo)
            const lista = document.getElementById('elenco-temporaneo');
            const nuovoElemento = document.createElement('li');
            nuovoElemento.textContent = testo;
            lista.appendChild(nuovoElemento);

            // Aggiorniamo il contatore dei pacchetti inseriti
            document.getElementById('badge-conteggio').innerText = elencoCarte.length;

            // Svuotiamo la cella di input per renderla pronta al prossimo inserimento
            input.value = "";
            input.focus();
        }

        // Funzione attivata dal tasto verde di fine fase
        function finalizzaInserimento() {
            if (elencoCarte.length === 0) {
                alert("Non hai inserito nessuna carta in questa sessione.");
                return;
            }
            
            // Per ora mandiamo solo un avviso, pronti a collegare la logica del punto 3
            alert(`Fase terminata! Hai inserito ${elencoCarte.length} stringhe. Pronto per il confronto con il DB Generale.`);
            console.log("Dati pronti per il confronto:", elencoCarte);
        }
    </script>
</body>
</html>

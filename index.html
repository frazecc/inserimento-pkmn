<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Inserimento Pokémon &amp; Controllo Guidato</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            color: #333;
            padding: 40px; 
            max-width: 700px;
            margin: 0 auto;
        }
        h1 { color: #0056b3; text-align: center; margin-bottom: 30px; }
        
        .box-standard, .wizard-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        label { font-weight: bold; color: #555; font-size: 0.95em; text-transform: uppercase; }
        
        input[type="text"], select { 
            padding: 10px; 
            border: 2px solid #ddd; 
            border-radius: 6px;
            font-size: 1.05em;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        input[type="text"]:focus, select:focus { border-color: #007bff; }
        
        /* Layout per Input + Pulsante Aggiungi */
        .inserimento-wrapper {
            display: flex;
            gap: 10px;
        }

        .container-selettore-duplicati {
            background: #fff3cd;
            border: 2px solid #ffeeba;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .container-selettore-duplicati label { color: #856404; }

        .link-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn-open-link {
            background: #17a2b8;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            white-space: nowrap;
            font-size: 0.95em;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            box-sizing: border-box;
        }
        .btn-open-link:hover { background: #138496; }
        .scorciatoia-info { font-size: 0.8em; color: #6c757d; margin-top: 4px; font-style: italic; }
        
        .btn-green {
            width: 100%;
            background: #28a745; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1.1em;
            transition: background 0.2s;
        }
        .btn-green:hover { background: #218838; }

        .btn-primary {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.05em;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #0056b3; }

        /* Stile pulsante Indietro */
        .btn-secondary {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.05em;
            transition: background 0.2s;
        }
        .btn-secondary:hover { background: #5a6268; }
        
        ol { padding-left: 20px; margin: 0; }
        li { padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 1.05em; }
        .contatore { float: right; background: #007bff; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.8em; }
        .stato-notifica { margin-bottom: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: bold; text-align: center; }

        #sezione-login { display: block; }
        #sezione-inserimento { display: none; }
        .wizard-container { display: none; }
        
        .wizard-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 20px; }
        .wizard-title { font-size: 1.3em; margin: 0; color: #333; }
        .wizard-progresso { font-weight: bold; color: #007bff; background: #e6f2ff; padding: 4px 10px; border-radius: 15px; font-size: 0.9em; }
        
        .badge-stato { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 0.85em; font-weight: bold; margin-bottom: 15px; }
        .stato-ok { background-color: #d4edda; color: #155724; }
        .stato-fallback { background-color: #fff3cd; color: #856404; }

        .grid-campi { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        @media (max-width: 600px) { .grid-campi { grid-template-columns: 1fr; } }
        .wizard-footer { display: flex; justify-content: space-between; border-top: 2px solid #f0f0f0; padding-top: 15px; margin-top: 20px; }
        
        .info-utente-corrente { text-align: right; font-size: 0.9em; color: #6c757d; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>🃏 Inserimento Rapido &amp; Verifica Guidata</h1>
    
    <div id="notifica" class="stato-notifica"></div>

    <div id="sezione-login">
        <div class="box-standard" style="text-align: center;">
            <div class="input-group">
                <label for="select-utente-iniziale" style="font-size: 1.2em; margin-bottom: 10px;">Chi sei?</label>
                <select id="select-utente-iniziale">
                    <option value="">Caricamento nomi in corso...</option>
                </select>
            </div>
            <button class="btn-primary" style="width: 100%; margin-top: 10px;" onclick="confermaUtente()">Inizia Sessione 🚀</button>
        </div>
    </div>

    <div id="sezione-inserimento">
        <div class="info-utente-corrente">Utente attivo: <span id="label-utente-attivo" style="color:#007bff;">-</span></div>
        <div class="box-standard">
            <div class="input-group">
                <label for="input-testo">Digita il testo della carta e aggiungilo:</label>
                <div class="inserimento-wrapper">
                    <input type="text" id="input-testo" placeholder="Inserisci il testo qui...">
                    <button class="btn-primary" onclick="aggiungiCarta()">Aggiungi ➕</button>
                </div>
            </div>
            <button class="btn-green" onclick="avviaVerificaDati()">Fase di inserimento terminata e verifica DB</button>
        </div>

        <div class="box-standard">
            <h3>Carte Inserite in questa sessione <span id="badge-conteggio" class="contatore">0</span></h3>
            <ol id="elenco-temporaneo"></ol>
        </div>
    </div>

    <div id="sezione-wizard" class="wizard-container">
        <div class="wizard-card">
            <div class="wizard-header">
                <h2 class="wizard-title" id="wizard-entry-corrente">Controllo Elemento</h2>
                <span class="wizard-progresso" id="wizard-indice-progresso">Elemento 1 di 1</span>
            </div>
            
            <div id="wizard-badge-stato" class="badge-stato">Stato</div>

            <div id="box-duplicati" class="container-selettore-duplicati">
                <label for="select-varianti">⚠️ Rilevate più corrispondenze nel DB! Scegli quale usare:</label>
                <select id="select-varianti" onchange="cambiaVarianteSelezionata(this.value)"></select>
            </div>

            <div class="grid-campi">
                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" id="w-nome">
                </div>
                <div class="input-group">
                    <label>Codice</label>
                    <input type="text" id="w-codice">
                </div>
                
                <div class="input-group">
                    <label>Posizione</label>
                    <input type="text" id="w-posizione">
                </div>
                <div class="input-group">
                    <label>Quantità</label>
                    <input type="text" id="w-quantita">
                </div>
                
                <div class="input-group">
                    <label>Lingua</label>
                    <input type="text" id="w-lingua">
                </div>
                <div class="input-group">
                    <label>Condizione</label>
                    <input type="text" id="w-condiz">
                </div>
                <div class="input-group" style="grid-column: span 2;">
                    <label>Link / Risorsa Esterna</label>
                    <div class="link-input-wrapper">
                        <input type="text" id="w-link" placeholder="http://...">
                        <a href="#" id="btn-link-cliccabile" target="_blank" class="btn-open-link">Apri Link 🔗</a>
                    </div>
                    <span class="scorciatoia-info">Puoi anche usare la combinazione rapida <strong>CTRL + Q</strong> in qualsiasi momento per aprire questo collegamento</span>
                </div>
                <div class="input-group">
                    <label>Prezzo</label>
                    <input type="text" id="w-prezzo">
                </div>
                <div class="input-group">
                    <label>Note</label>
                    <input type="text" id="w-note">
                </div>
                <div class="input-group" style="grid-column: span 2;">
                    <label>Proprietario</label>
                    <input type="text" id="w-proprietario">
                </div>
            </div>

            <div class="wizard-footer">
                <button class="btn-secondary" id="btn-wizard-indietro" onclick="wizardIndietro()" style="visibility: hidden;">⬅️ Indietro</button>
                <button class="btn-primary" id="btn-wizard-avanti" onclick="wizardAvanti()">Avanti ➡️</button>
            </div>
        </div>
    </div>

    <script>
        let elencoCarte = [];
        let risultatiElaborati = [];
        let indiceCorrente = 0;
        let datiFinalizzatiPerDB = [];
        let utenteSelezionato = "";
        
        const URL_API_GOOGLE = "https://script.google.com/macros/s/AKfycbyk9JIavd03rNPWNXsZbb88Lik2W6BhkTHrE0cs4JxHdgV5sfqRByu3fM61XQFk4_21ww/exec";

        window.addEventListener('keydown', function(e) {
            const wizardVisibile = document.getElementById('sezione-wizard').style.display === "block";
            if (wizardVisibile && (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'q') {
                e.preventDefault();
                e.stopPropagation();
                apriLinkCorrente();
            }
        }, true);

        function apriLinkCorrente() {
            const url = document.getElementById('w-link').value.trim();
            if (url && url !== "#" && url !== "") {
                window.open(url, '_blank');
            } else {
                alert("Nessun link valido inserito in questo campo.");
            }
        }

        window.addEventListener('beforeunload', function (e) {
            if (risultatiElaborati.length > 0 && indiceCorrente < risultatiElaborati.length) {
                e.preventDefault();
                e.returnValue = 'Hai una procedura di verifica in corso. Se esci perderai i dati modificati!';
            }
        });

        window.addEventListener('load', function() {
            caricaListaNomiIniziale();

            if(localStorage.getItem('wizard_backup_risultati')) {
                if(confirm("È stato trovato un lavoro di verifica non completato. Vuoi riprendere da dove avevi lasciato?")) {
                    risultatiElaborati = JSON.parse(localStorage.getItem('wizard_backup_risultati'));
                    indiceCorrente = parseInt(localStorage.getItem('wizard_backup_indice')) || 0;
                    datiFinalizzatiPerDB = JSON.parse(localStorage.getItem('wizard_backup_dati_salvati')) || [];
                    utenteSelezionato = localStorage.getItem('wizard_backup_utente') || "";
                    
                    document.getElementById('sezione-login').style.display = "none";
                    document.getElementById('sezione-inserimento').style.display = "none";
                    document.getElementById('sezione-wizard').style.display = "block";
                    mostraElementoWizard(indiceCorrente);
                } else {
                    pulisciBackupLocale();
                }
            }
        });

        async function caricaListaNomiIniziale() {
            try {
                const response = await fetch(URL_API_GOOGLE, {
                    method: 'POST',
                    body: JSON.stringify({ azione: "prendi_nomi" })
                });
                const risposta = JSON.parse(await response.text());
                if (risposta.success) {
                    const select = document.getElementById('select-utente-iniziale');
                    select.innerHTML = '<option value="">-- Seleziona il tuo nome --</option>';
                    risposta.nomi.forEach(nome => {
                        const opt = document.createElement('option');
                        opt.value = nome;
                        opt.innerText = nome;
                        select.appendChild(opt);
                    });
                }
            } catch (err) {
                console.error("Errore caricamento nomi:", err);
                document.getElementById('select-utente-iniziale').innerHTML = '<option value="">Errore nel caricamento dei nomi</option>';
            }
        }

        function confermaUtente() {
            const select = document.getElementById('select-utente-iniziale');
            if (select.value === "") {
                alert("Devi selezionare il tuo nome prima di procedere!");
                return;
            }
            utenteSelezionato = select.value;
            localStorage.setItem('wizard_backup_utente', utenteSelezionato);
            
            document.getElementById('label-utente-attivo').innerText = utenteSelezionato;
            document.getElementById('sezione-login').style.display = "none";
            document.getElementById('sezione-inserimento').style.display = "block";
            document.getElementById('input-testo').focus();
        }

        document.getElementById('input-testo').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { aggiungiCarta(); }
        });

        function aggiungiCarta() {
            const input = document.getElementById('input-testo');
            const testo = input.value.trim();
            if (testo === "") return;

            elencoCarte.push(testo);
            const lista = document.getElementById('elenco-temporaneo');
            const nuovoElemento = document.createElement('li');
            nuovoElemento.textContent = testo;
            lista.appendChild(nuovoElemento);

            document.getElementById('badge-conteggio').innerText = elencoCarte.length;
            input.value = "";
            input.focus();
        }

        async function avviaVerificaDati() {
            if (elencoCarte.length === 0) {
                alert("Non hai inserito alcun elemento da verificare.");
                return;
            }
            
            const notifica = document.getElementById('notifica');
            notifica.style.display = "block";
            notifica.style.background = "#fff3cd";
            notifica.style.color = "#856404";
            notifica.innerText = `Interrogazione Database in corso per ${elencoCarte.length} elementi...`;

            try {
                const response = await fetch(URL_API_GOOGLE, {
                    method: 'POST',
                    body: JSON.stringify({ azione: "verifica_iniziale", carte: elencoCarte })
                });

                const testoRisposta = await response.text();
                const rispostaDati = JSON.parse(testoRisposta);

                if(rispostaDati.success) {
                    notifica.style.display = "none";
                    risultatiElaborati = rispostaDati.risultati;
                    indiceCorrente = 0;
                    datiFinalizzatiPerDB = [];
                    
                    salvaBackupLocale();

                    document.getElementById('sezione-inserimento').style.display = "none";
                    document.getElementById('sezione-wizard').style.display = "block";
                    
                    mostraElementoWizard(indiceCorrente);
                    
                    elencoCarte = [];
                    document.getElementById('elenco-temporaneo').innerHTML = "";
                    document.getElementById('badge-conteggio').innerText = "0";
                } else {
                    throw new Error(rispostaDati.error);
                }
                
            } catch (error) {
                console.error("Errore:", error);
                notifica.style.background = "#f8d7da";
                notifica.style.color = "#721c24";
                notifica.innerText = "❌ Errore durante l'elaborazione dei dati a DB: " + error.message;
            }
        }

        function mostraElementoWizard(indice) {
            if (indice >= risultatiElaborati.length) return;
            
            const item = risultatiElaborati[indice];
            
            document.getElementById('wizard-entry-corrente').innerText = `Verifica per: "${item.entry}"`;
            document.getElementById('wizard-indice-progresso').innerText = `Elemento ${indice + 1} di ${risultatiElaborati.length}`;
            
            const badge = document.getElementById('wizard-badge-stato');
            badge.innerText = item.oppureScegli.length > 1 ? `Trovate ${item.oppureScegli.length} varianti` : item.stato;
            
            if(item.stato === "Trovato nel DB") {
                badge.className = "badge-stato stato-ok";
            } else {
                badge.className = "badge-stato stato-fallback";
            }
            
            const boxDuplicati = document.getElementById('box-duplicati');
            const selectVarianti = document.getElementById('select-varianti');
            selectVarianti.innerHTML = ""; 

            if (item.oppureScegli && item.oppureScegli.length > 1) {
                boxDuplicati.style.display = "block";
                
                item.oppureScegli.forEach((variante, idx) => {
                    const opt = document.createElement('option');
                    opt.value = idx;
                    const linguaInfo = variante.lingua ? variante.lingua : "Nessuna lingua";
                    const condizInfo = variante.condiz ? variante.condiz : "Nessuna condiz.";
                    const noteInfo = variante.note ? ` (${variante.note})` : "";
                    
                    opt.innerText = `${linguaInfo} - ${condizInfo}${noteInfo}`;
                    selectVarianti.appendChild(opt);
                });
                
                const optNessuna = document.createElement('option');
                optNessuna.value = "nessuna";
                optNessuna.innerText = "❌ Nessuna di queste";
                selectVarianti.appendChild(optNessuna);
                
            } else {
                boxDuplicati.style.display = "none";
            }

            // Gestione visibilità pulsante indietro
            const btnIndietro = document.getElementById('btn-wizard-indietro');
            if (indice > 0) {
                btnIndietro.style.visibility = "visible";
            } else {
                btnIndietro.style.visibility = "hidden";
            }

            // Se l'utente sta tornando indietro, ripopola con i vecchi dati salvati, altrimenti carica quelli di default
            if (datiFinalizzatiPerDB[indice]) {
                caricaCampiInput(datiFinalizzatiPerDB[indice]);
            } else {
                caricaCampiInput(item.oppureScegli[0]);
            }

            const btnAvanti = document.getElementById('btn-wizard-avanti');
            if (indice === risultatiElaborati.length - 1) {
                btnAvanti.innerText = "Finalizza e Salva su Foglio Google 💾";
                btnAvanti.style.background = "#28a745";
            } else {
                btnAvanti.innerText = "Avanti ➡️";
                btnAvanti.style.background = "#007bff";
            }
        }

        function cambiaVarianteSelezionata(valore) {
            const item = risultatiElaborati[indiceCorrente];
            if (valore === "nessuna") {
                document.getElementById('w-nome').value = "";
                document.getElementById('w-codice').value = item.entry;
                document.getElementById('w-posizione').value = "";
                document.getElementById('w-quantita').value = "1"; // FORZATURA DEFAULT A 1
                document.getElementById('w-lingua').value = "";
                document.getElementById('w-condiz').value = "";
                document.getElementById('w-prezzo').value = "";
                document.getElementById('w-note').value = "";
                document.getElementById('w-proprietario').value = utenteSelezionato; 
                
                const inputLink = document.getElementById('w-link');
                const btnLink = document.getElementById('btn-link-cliccabile');
                inputLink.value = item.linkFallback || "";
                btnLink.href = item.linkFallback && item.linkFallback.startsWith('http') ? item.linkFallback : "#";
            } else {
                caricaCampiInput(item.oppureScegli[parseInt(valore)]);
            }
        }

        function caricaCampiInput(datiVariante) {
            document.getElementById('w-nome').value = datiVariante.nome || "";
            document.getElementById('w-codice').value = datiVariante.codice || "";
            document.getElementById('w-posizione').value = datiVariante.posizione || "";
            
            // IMPOSTAZIONE QUANTITÀ A 1 DI DEFAULT (sia se vuoto, sia se proviene dal DB)
            document.getElementById('w-quantita').value = "1";
            
            document.getElementById('w-lingua').value = datiVariante.lingua || "";
            document.getElementById('w-condiz').value = datiVariante.condiz || "";
            document.getElementById('w-prezzo').value = datiVariante.prezzo || "";
            document.getElementById('w-note').value = datiVariante.note || "";
            
            document.getElementById('w-proprietario').value = utenteSelezionato; 
            
            const urlCorrente = datiVariante.link || "";
            const inputLink = document.getElementById('w-link');
            const btnLink = document.getElementById('btn-link-cliccabile');
            
            inputLink.value = urlCorrente;
            btnLink.href = urlCorrente && urlCorrente.startsWith('http') ? urlCorrente : "#";
            
            inputLink.oninput = function() {
                btnLink.href = this.value.trim().startsWith('http') ? this.value.trim() : "#";
            };
        }

        function wizardAvanti() {
            const rigaCompilata = {
                nome: document.getElementById('w-nome').value.trim(),
                codice: document.getElementById('w-codice').value.trim(),
                posizione: document.getElementById('w-posizione').value.trim(),
                quantita: document.getElementById('w-quantita').value.trim(),
                lingua: document.getElementById('w-lingua').value.trim(),
                condiz: document.getElementById('w-condiz').value.trim(),
                link: document.getElementById('w-link').value.trim(),
                prezzo: document.getElementById('w-prezzo').value.trim(),
                note: document.getElementById('w-note').value.trim(),
                proprietario: document.getElementById('w-proprietario').value.trim()
            };
            
            // Salva o sovrascrive i dati all'indice corrente
            datiFinalizzatiPerDB[indiceCorrente] = rigaCompilata;
            indiceCorrente++;
            salvaBackupLocale();
            
            if (indiceCorrente < risultatiElaborati.length) {
                mostraElementoWizard(indiceCorrente);
            } else {
                inviaDatiFinaliAGoogle();
            }
        }

        // NUOVA FUNZIONE PER TORNARE INDIETRO
        function wizardIndietro() {
            if (indiceCorrente > 0) {
                indiceCorrente--;
                salvaBackupLocale();
                mostraElementoWizard(indiceCorrente);
            }
        }

        async function inviaDatiFinaliAGoogle() {
            document.getElementById('sezione-wizard').style.display = "none";
            const notifica = document.getElementById('notifica');
            notifica.style.display = "block";
            notifica.style.background = "#fff3cd";
            notifica.style.color = "#856404";
            notifica.innerText = "Scrittura finale dei dati validati sul Foglio Google in corso...";

            try {
                const response = await fetch(URL_API_GOOGLE, {
                    method: 'POST',
                    body: JSON.stringify({ azione: "salvataggio_finale", datiFinali: datiFinalizzatiPerDB })
                });

                const testoRisposta = await response.text();
                const rispostaDati = JSON.parse(testoRisposta);

                if (rispostaDati.success) {
                    notifica.style.background = "#d4edda";
                    notifica.style.color = "#155724";
                    notifica.innerHTML = "🎉 <strong>my job here is done!</strong><br>Tutti i dati controllati sono stati salvati correttamente.";
                    
                    pulisciBackupLocale();
                    risultatiElaborati = [];
                    datiFinalizzatiPerDB = [];
                    indiceCorrente = 0;
                    
                    setTimeout(() => {
                        notifica.style.display = "none";
                        document.getElementById('sezione-inserimento').style.display = "block";
                    }, 5000);
                } else {
                    throw new Error(rispostaDati.error);
                }
            } catch (error) {
                console.error("Errore nel salvataggio finale:", error);
                notifica.style.background = "#f8d7da";
                notifica.style.color = "#721c24";
                notifica.innerText = "❌ Errore durante il salvataggio finale a DB: " + error.message;
                indiceCorrente--;
                salvaBackupLocale();
            }
        }

        function salvaBackupLocale() {
            localStorage.setItem('wizard_backup_risultati', JSON.stringify(risultatiElaborati));
            localStorage.setItem('wizard_backup_indice', indiceCorrente);
            localStorage.setItem('wizard_backup_dati_salvati', JSON.stringify(datiFinalizzatiPerDB));
            localStorage.setItem('wizard_backup_utente', utenteSelezionato);
        }

        function pulisciBackupLocale() {
            localStorage.removeItem('wizard_backup_risultati');
            localStorage.removeItem('wizard_backup_indice');
            localStorage.removeItem('wizard_backup_dati_salvati');
            localStorage.removeItem('wizard_backup_utente');
        }
    </script>
</body>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Inserimento Pokémon & Controllo DB</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            color: #333;
            padding: 40px; 
            max-width: 900px;
            margin: 0 auto;
        }
        h1 { color: #0056b3; text-align: center; margin-bottom: 30px; }
        
        .box-inserimento, .sezione-elenco, .sezione-risultati {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        label { font-weight: bold; color: #555; }
        
        input[type="text"] { 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px;
            font-size: 1.1em;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #007bff; }
        
        .btn-fine {
            width: 100%;
            background: #28a745; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1.1em;
            transition: background 0.2s;
        }
        .btn-fine:hover { background: #218838; }
        
        ol { padding-left: 20px; margin: 0; }
        li { padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 1.05em; }
        
        .contatore {
            float: right;
            background: #007bff;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8em;
        }

        .stato-invio {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: bold;
            text-align: center;
        }

        /* Stili per la tabella dei risultati del DB */
        .sezione-risultati { display: none; }
        .sezione-risultati h2 { color: #333; margin-top: 0; border-bottom: 2px solid #007bff; padding-bottom: 8px; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.95em;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th { background-color: #f8f9fa; color: #444; }
        
        .badge-stato {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .stato-ok { background-color: #d4edda; color: #155724; }
        .stato-fallback { background-color: #fff3cd; color: #856404; }
        
        .link-url {
            max-width: 200px;
            display: inline-block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <h1>🃏 Inserimento Rapido & Controllo Incrociato</h1>
    
    <div id="notifica" class="stato-invio"></div>

    <!-- FASE 1: Box Input -->
    <div class="box-inserimento" id="container-input">
        <div class="input-group">
            <label for="input-testo">Digita il testo della carta e premi Invio:</label>
            <input type="text" id="input-testo" placeholder="Inserisci il testo qui..." autofocus>
        </div>
        <button class="btn-fine" onclick="finalizzaInserimento()">Fase di inserimento terminata e verifica DB</button>
    </div>

    <!-- FASE 2: Elenco temporaneo -->
    <div class="sezione-elenco" id="container-elenco">
        <h3>Carte Inserite in questa sessione <span id="badge-conteggio" class="contatore">0</span></h3>
        <ol id="elenco-temporaneo"></ol>
    </div>

    <!-- FASE 3: Tabella di Resoconto Dati Estrapolati -->
    <div class="sezione-risultati" id="container-risultati">
        <h2>📋 Riscontro Dati dal Database</h2>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Elemento Cercato</th>
                        <th>Esito</th>
                        <th>Colonna A (Nome)</th>
                        <th>Colonna B (Codice)</th>
                        <th>Lingua</th>
                        <th>Stato</th>
                        <th>Link / Risorsa Esterna</th>
                    </tr>
                </thead>
                <tbody id="tabella-corpo-risultati">
                    <!-- I dati elaborati appariranno qui -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let elencoCarte = [];

        document.getElementById('input-testo').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { aggiungiCarta(); }
        });

        function aggiungiCarta() {
            const input = document.getElementById('input-testo');
            const testo = input.value.trim();
            if (testo === "") return;

            elencoCarte.push(testo);

            const lista = document.getElementById('elenco-temporaneo');
            const nuovoElemento = document.createElement('li');
            nuovoElemento.textContent = testo;
            lista.appendChild(nuovoElemento);

            document.getElementById('badge-conteggio').innerText = elencoCarte.length;
            input.value = "";
            input.focus();
        }

        async function finalizzaInserimento() {
            if (elencoCarte.length === 0) {
                alert("Non hai inserito alcuna carta da verificare.");
                return;
            }
            
            const notifica = document.getElementById('notifica');
            notifica.style.display = "block";
            notifica.style.background = "#fff3cd";
            notifica.style.color = "#856404";
            notifica.innerText = `Archiviazione e controllo incrociato di ${elencoCarte.length} elementi in corso...`;

            // INCOLLA QUI L'URL SE È CAMBIATO DOPO L'AGGIORNAMENTO DEL CODICE SCRIPT
            const URL_API_GOOGLE = "https://script.google.com/macros/s/AKfycbyk9JIavd03rNPWNXsZbb88Lik2W6BhkTHrE0cs4JxHdgV5sfqRByu3fM61XQFk4_21ww/exec";

            try {
                // Eseguiamo la chiamata POST richiedendo i dati indietro tramite risposta standard JSON
                const response = await fetch(URL_API_GOOGLE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' }, // Evita problemi di pre-flight CORS con Apps Script
                    body: JSON.stringify({ carte: elencoCarte })
                });

                const rispostaDati = await response.json();

                if(rispostaDati.success) {
                    notifica.style.background = "#d4edda";
                    notifica.style.color = "#155724";
                    notifica.innerText = "🎉 Salvataggio completato ed elaborazione DB riuscita!";
                    
                    // Mostriamo la tabella dei risultati
                    mostraRisultatiAStato(rispostaDati.risultati);
                    
                    // Resettiamo l'interfaccia di inserimento
                    elencoCarte = [];
                    document.getElementById('elenco-temporaneo').innerHTML = "";
                    document.getElementById('badge-conteggio').innerText = "0";
                } else {
                    throw new Error(rispostaDati.error);
                }
                
            } catch (error) {
                console.error("Errore riscontrato:", error);
                notifica.style.background = "#f8d7da";
                notifica.style.color = "#721c24";
                notifica.innerText = "❌ Errore durante l'elaborazione dei dati a DB: " + error.message;
            }
        }

        function mostraRisultatiAStato(risultati) {
            const corpoTabella = document.getElementById('tabella-corpo-risultati');
            corpoTabella.innerHTML = ""; // Pulisce vecchi dati
            
            risultati.forEach(res => {
                // "res.dati" conterrà una o più righe corrispondenti trovate
                res.dati.forEach(riga => {
                    const tr = document.createElement('tr');
                    
                    // Prepariamo i badge visivi di stato
                    const isTrovato = (res.stato === "Trovato nel DB");
                    const classeBadge = isTrovato ? "stato-ok" : "stato-fallback";
                    
                    // Mappatura delle colonne provenienti dal foglio (A, B, C, D, E)
                    const colA = riga[0] || "-";
                    const colB = riga[1] || "-";
                    const colC = riga[2] || "-";
                    const colD = riga[3] || "-";
                    const colE = riga[4] || "#"; // Il link (Cardmarket o Fallback B1)

                    // Creazione del markup della riga della tabella
                    tr.innerHTML = `
                        <td><strong>${res.entry}</strong></td>
                        <td><span class="badge-stato ${classeBadge}">${res.stato}</span></td>
                        <td>${colA}</td>
                        <td>${colB}</td>
                        <td>${colC}</td>
                        <td>${colD}</td>
                        <td>
                            <a class="link-url" href="${colE}" target="_blank" title="${colE}">
                                ${colE.startsWith('http') ? 'Apri Collegamento 🔗' : colE}
                            </a>
                        </td>
                    `;
                    corpoTabella.appendChild(tr);
                });
            });
            
            // Rendiamo visibile il box della tabella finale
            document.getElementById('container-risultati').style.display = "block";
        }
    </script>
</body>
</html>

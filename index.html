<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Inserimento Pokémon</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            color: #333;
            padding: 40px; 
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { color: #0056b3; text-align: center; margin-bottom: 30px; }
        
        .box-inserimento {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        label { font-weight: bold; color: #555; }
        
        input[type="text"] { 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 8px;
            font-size: 1.1em;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #007bff;
        }
        
        .btn-fine {
            width: 100%;
            background: #28a745; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1.1em;
            transition: background 0.2s;
        }
        .btn-fine:hover { background: #218838; }

        .sezione-elenco {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .sezione-elenco h3 { margin-top: 0; color: #444; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        ol { padding-left: 20px; margin: 0; }
        
        li { 
            padding: 8px 0; 
            border-bottom: 1px solid #f0f0f0; 
            font-size: 1.05em; 
            word-break: break-word;
        }
        li:last-child { border-bottom: none; }
        
        .contatore {
            float: right;
            background: #007bff;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.8em;
        }

        .stato-invio {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>🃏 Inserimento Rapido Collezione</h1>
    
    <div id="notifica" class="stato-invio"></div>

    <div class="box-inserimento">
        <div class="input-group">
            <label for="input-testo">Digita il testo della carta e premi Invio:</label>
            <input type="text" id="input-testo" placeholder="Inserisci il testo qui..." autofocus>
        </div>
        <button class="btn-fine" onclick="finalizzaInserimento()">Fase di inserimento terminata</button>
    </div>

    <div class="sezione-elenco">
        <h3>Carte Inserite in questa sessione <span id="badge-conteggio" class="contatore">0</span></h3>
        <ol id="elenco-temporaneo">
            </ol>
    </div>

    <script>
        // Array temporaneo in memoria browser
        let elencoCarte = [];

        // Intercetta la pressione del tasto Invio
        document.getElementById('input-testo').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                aggiungiCarta();
            }
        });

        function aggiungiCarta() {
            const input = document.getElementById('input-testo');
            const testo = input.value.trim();

            if (testo === "") return;

            elencoCarte.push(testo);

            const lista = document.getElementById('elenco-temporaneo');
            const nuovoElemento = document.createElement('li');
            nuovoElemento.textContent = testo;
            lista.appendChild(nuovoElemento);

            document.getElementById('badge-conteggio').innerText = elencoCarte.length;

            input.value = "";
            input.focus();
        }

        // Spedisce tutto l'elenco accumulato al foglio "CODICI INSERITI"
        async function finalizzaInserimento() {
            if (elencoCarte.length === 0) {
                alert("Non hai inserito alcuna carta in questa sessione.");
                return;
            }
            
            const notifica = document.getElementById('notifica');
            notifica.style.display = "block";
            notifica.style.background = "#fff3cd";
            notifica.style.color = "#856404";
            notifica.innerText = `Salvataggio di ${elencoCarte.length} elementi su Google Drive in corso...`;

            // Il tuo NUOVO URL dell'App Web aggiornato
            const URL_API_GOOGLE = "https://script.google.com/macros/s/AKfycbyk9JIavd03rNPWNXsZbb88Lik2W6BhkTHrE0cs4JxHdgV5sfqRByu3fM61XQFk4_21ww/exec";

            try {
                // Inviamo l'intero pacchetto in un colpo solo
                await fetch(URL_API_GOOGLE, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ carte: elencoCarte })
                });

                // Aggiorna l'interfaccia a salvataggio completato
                notifica.style.background = "#d4edda";
                notifica.style.color = "#155724";
                notifica.innerText = "🎉 Dati salvati con successo nella pagina 'CODICI INSERITI'!";
                
                // Svuota l'elenco temporaneo pronto per una nuova sessione
                elencoCarte = [];
                document.getElementById('elenco-temporaneo').innerHTML = "";
                document.getElementById('badge-conteggio').innerText = "0";
                
            } catch (error) {
                console.error("Errore riscontrato:", error);
                notifica.style.background = "#f8d7da";
                notifica.style.color = "#721c24";
                notifica.innerText = "❌ Errore critico durante il salvataggio dei dati.";
            }
        }
    </script>
</body>
</html>
